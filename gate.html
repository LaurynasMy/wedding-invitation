<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vestuvių kvietimas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* ── Full-screen arch background ── */
    .gate-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .gate-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      filter: none;
    }

    /* ── Leaf decorations (bottom-left) ── */
    .wc-leaf {
      position: fixed;
      bottom: 40px;
      left: 40px;
      width: 52px;
      opacity: 0.55;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Frosted glass card ── */
    .gate-card {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gate-inner {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 16px;
      padding: 36px 40px 40px;
      max-width: 380px;
      width: 90vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Botanical + diamond monogram ── */
    .monogram-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .botanical-art { width: 220px; margin-bottom: -20px; position: relative; z-index: 1; }
    .botanical-art svg { width: 100%; height: auto; }

    .diamond-frame {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .diamond-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .diamond-letters {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; line-height: 1.2;
    }
    .d-letter {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.9rem;
      font-weight: 400;
      color: #2d3a2a;
      line-height: 1.2;
    }

    /* ── Hint text ── */
    .gate-hint {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: #5a7055;
    }

    /* ── Input + button ── */
    .gate-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }
    #codeInput {
      width: 100%;
      background: rgba(255,255,255,0.7);
      border: 1px solid #c5dbbe;
      border-radius: 4px;
      padding: 12px 16px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-align: center;
      color: #2d3a2a;
      outline: none;
      transition: border-color 0.3s;
    }
    #codeInput::placeholder { color: #aac4a4; letter-spacing: 0.2em; }
    #codeInput:focus { border-color: #7a9e72; }

    #codeBtn {
      background: #6b7c3a;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 11px 40px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: background 0.3s;
    }
    #codeBtn:hover { background: #5e7d57; }
    #codeBtn:disabled { opacity: 0.6; cursor: not-allowed; }

    .gate-error {
      font-size: 0.75rem;
      color: #b85c5c;
      text-align: center;
      min-height: 1.1em;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <!-- Full-screen arch background -->
  <div class="gate-bg">
    <img
      src="gate-bg.jpg"
      alt=""
    />
  </div>

  <!-- Bottom-left leaf decoration -->
  <div class="wc-leaf">
    <svg viewBox="0 0 80 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 150 C20 120 5 90 10 50 C15 20 35 5 40 2 C45 5 65 20 70 50 C75 90 60 120 40 150Z" stroke="white" stroke-width="1.5" fill="none"/>
      <path d="M40 150 L40 2" stroke="white" stroke-width="1" opacity="0.6"/>
      <path d="M40 110 C30 100 15 90 10 75" stroke="white" stroke-width="0.8" opacity="0.5"/>
      <path d="M40 80 C25 68 12 58 8 45" stroke="white" stroke-width="0.8" opacity="0.5"/>
      <path d="M40 110 C50 100 65 90 70 75" stroke="white" stroke-width="0.8" opacity="0.5"/>
      <path d="M40 80 C55 68 68 58 72 45" stroke="white" stroke-width="0.8" opacity="0.5"/>
    </svg>
  </div>

  <!-- Frosted glass login card -->
  <div class="gate-card">
    <div class="gate-inner">
      <div class="monogram-wrap">
        <div class="botanical-art">
          <svg viewBox="0 0 260 110" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M80 105 C75 80 70 60 68 40" stroke="#4f5c2a" stroke-width="1.2" fill="none"/>
            <path d="M68 40 C65 20 60 8 58 0" stroke="#4f5c2a" stroke-width="1.2" fill="none"/>
            <ellipse cx="64" cy="35" rx="3" ry="6" fill="#7a8c42" opacity="0.8" transform="rotate(-15 64 35)"/>
            <ellipse cx="60" cy="20" rx="3" ry="6" fill="#7a8c42" opacity="0.8" transform="rotate(-20 60 20)"/>
            <ellipse cx="70" cy="12" rx="2.5" ry="5" fill="#7a8c42" opacity="0.7" transform="rotate(5 70 12)"/>
            <path d="M72 55 C80 48 88 44 94 42" stroke="#4f5c2a" stroke-width="1" fill="none"/>
            <path d="M74 65 C83 60 90 58 96 57" stroke="#4f5c2a" stroke-width="1" fill="none"/>
            <path d="M130 108 C128 85 125 65 122 45 C119 25 116 12 115 2" stroke="#4f5c2a" stroke-width="1.2" fill="none"/>
            <path d="M122 45 C110 38 100 34 92 35" stroke="#4f5c2a" stroke-width="1" fill="none"/>
            <path d="M119 60 C108 55 98 52 90 54" stroke="#4f5c2a" stroke-width="1" fill="none"/>
            <path d="M155 105 C158 82 162 62 165 42" stroke="#4f5c2a" stroke-width="1.2" fill="none"/>
            <path d="M165 42 C168 24 172 10 174 2" stroke="#4f5c2a" stroke-width="1.2" fill="none"/>
            <path d="M163 55 C173 48 183 44 192 43" stroke="#4f5c2a" stroke-width="1" fill="none"/>
            <path d="M166 70 C176 65 185 63 193 63" stroke="#4f5c2a" stroke-width="1" fill="none"/>
          </svg>
        </div>
        <div class="diamond-frame">
          <svg class="diamond-svg" viewBox="0 0 160 160" fill="none">
            <polygon points="80,4 156,80 80,156 4,80" stroke="#333" stroke-width="1.2" fill="none"/>
          </svg>
          <div class="diamond-letters">
            <span class="d-letter">J</span>
            <span class="d-letter">L</span>
          </div>
        </div>
      </div>

      <p class="gate-hint">Įveskite savo kvietimo kodą</p>
      <div class="gate-form">
        <input id="codeInput" type="text" placeholder="KODAS" maxlength="12" autocomplete="off" spellcheck="false" />
        <button id="codeBtn" onclick="validateCode()">Įeiti</button>
      </div>
      <p id="codeError" class="gate-error"></p>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzh3XFfU1PqIDs5NHLcXV5DduXd03CojDnj_2Inl6hLgn44J5Kgd2odD8qF_bB9B_VkIg/exec';

    document.getElementById('codeInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') validateCode();
    });

    async function validateCode() {
      const input   = document.getElementById('codeInput');
      const errorEl = document.getElementById('codeError');
      const btn     = document.getElementById('codeBtn');
      const code    = input.value.trim().toUpperCase();

      if (!code) { errorEl.textContent = 'Įveskite kodą'; return; }

      btn.disabled        = true;
      btn.textContent     = '...';
      errorEl.textContent = '';

      try {
        const url      = `${APPS_SCRIPT_URL}?action=validateCode&code=${encodeURIComponent(code)}`;
        const response = await fetch(url);
        const data     = await response.json();

        if (data.valid) {
          // Pass the validated code to invitation page via sessionStorage
          sessionStorage.setItem('weddingCode', code);
          window.location.href = 'index.html';
        } else {
          errorEl.textContent = 'Neteisingas kodas. Bandykite dar kartą.';
        }
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Ryšio klaida. Bandykite vėliau.';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Įeiti';
      }
    }
  </script>
</body>
</html>
